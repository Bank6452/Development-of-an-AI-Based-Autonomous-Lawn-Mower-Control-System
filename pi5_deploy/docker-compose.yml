# =============================================================
#  docker-compose.yml
#  รัน ROS2 Mower บน Pi 5 ด้วย docker compose up
# =============================================================

version: "3.8"

services:
  mower_ros:
    image: mower_ros:latest
    container_name: mower_ros
    restart: unless-stopped

    # ── เชื่อมต่อ Network แบบ Host ──────────────────────────────
    # จำเป็นสำหรับ ROS2 DDS ให้คุยกับ Node อื่นนอก Container ได้
    network_mode: host

    # ── Privileges ────────────────────────────────────────────
    privileged: true          # จำเป็นสำหรับเข้าถึง USB/Serial
    
    # ── Environment ───────────────────────────────────────────
    environment:
      - ROS_DOMAIN_ID=0
      - RCUTILS_COLORIZED_OUTPUT=1
      - DISPLAY=${DISPLAY:-:0}     # สำหรับ RViz2 (ถ้าต่อจอ)

    # ── อุปกรณ์ Hardware ──────────────────────────────────────
    devices:
      # Hailo AI HAT
      - /dev/hailo0:/dev/hailo0
      # STM32 Motor Controller
      - /dev/stm32:/dev/stm32
      # GPS RTK (FTDI)
      - /dev/gps_rtk:/dev/gps_rtk
      # Lidar (RPLidar)
      - /dev/ttyUSB0:/dev/ttyUSB0
      # Fallback USB ports (ถ้า udev rules ยังไม่ได้ตั้ง)
      # - /dev/ttyUSB1:/dev/ttyUSB1
      # - /dev/ttyACM0:/dev/ttyACM0

    # ── Volume Mounts ─────────────────────────────────────────
    volumes:
      # Maps (แก้ไขแผนที่จาก Host ได้โดยไม่ต้อง rebuild image)
      - ./maps:/ros2_ws/src/robot_bridge/maps
      # Config (ปรับ nav2_params.yaml จาก Host ได้เลย)
      - ./config:/ros2_ws/src/robot_bridge/config
      # YOLO Model (ถ้าอยากเปลี่ยน Model ทีหลัง)
      - ./models:/ros2_ws/models
      # Logs
      - ./logs:/ros2_ws/logs
      # RViz2 display (ถ้าต่อจอ)
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

    # ── คำสั่งเริ่มต้น ─────────────────────────────────────────
    # เปลี่ยนได้ตามต้องการ เช่น launch file ที่ต้องการ
    command: >
      bash -c "
        ros2 launch robot_bridge bringup_launch.py
      "

    # ── Resource Limits (ป้องกัน RAM เต็ม) ───────────────────
    mem_limit: 3g
    memswap_limit: 4g

    # ── Healthcheck ───────────────────────────────────────────
    healthcheck:
      test: ["CMD", "ros2", "node", "list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    # ── Logging ───────────────────────────────────────────────
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
